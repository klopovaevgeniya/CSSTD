{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля - ЦСУРТ</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2026-02-05">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .password-container {
            position: relative;
        }
        .password-container input {
            width: 100%;
            padding-right: 40px;
            box-sizing: border-box;
        }
        .password-container button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">ЦСУРТ</div>
            <h1>Смена пароля</h1>
            <p>Для продолжения работы необходимо установить новый пароль</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="new_password">Новый пароль</label>
                <div class="password-container">
                    <input type="password" name="new_password" id="new_password"
                           placeholder="Введите новый пароль" required>
                    <button type="button" class="toggle-password-btn" data-target="new_password">&#128065;</button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <div class="password-container">
                    <input type="password" name="confirm_password" id="confirm_password"
                           placeholder="Повторите новый пароль" required>
                    <button type="button" class="toggle-password-btn" data-target="confirm_password">&#128065;</button>
                </div>
            </div>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-save"></i> Сохранить пароль
            </button>
        </form>

        <div class="auth-footer">
            <p>Пароль должен содержать минимум 8 символов</p>
        </div>
    </div>
</div>

<script>
// Функциональность показа/скрытия пароля
document.addEventListener('DOMContentLoaded', function() {
    const toggleButtons = document.querySelectorAll('.toggle-password-btn');
    
    toggleButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            
            if (input.type === 'password') {
                input.type = 'text';
                this.innerHTML = '&#128064;';
            } else {
                input.type = 'password';
                this.innerHTML = '&#128065;';
            }
        });
    });

    // Валидация формы
    const form = document.querySelector('.auth-form');
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');

    form.addEventListener('submit', function(e) {
        if (newPassword.value !== confirmPassword.value) {
            e.preventDefault();
            alert('Пароли не совпадают!');
            return false;
        }

        if (newPassword.value.length < 8) {
            e.preventDefault();
            alert('Пароль должен содержать минимум 8 символов!');
            return false;
        }
    });
});
</script>

</body>
</html>
