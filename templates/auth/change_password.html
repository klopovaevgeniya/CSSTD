<!-- Summary: Файл `templates/auth/change_password.html`: содержит код и настройки для раздела "change password". -->
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля - ЦСУРТ</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2026-04-27-responsive">
    <link rel="stylesheet" href="{% static 'css/responsive-global.css' %}?v=2026-04-27-all-pages">
    <link rel="stylesheet" href="{% static 'css/form-validation.css' %}?v=2026-04-27-forms">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">ЦСУРТ</div>
            <h1>Смена пароля</h1>
            <p>Для продолжения работы необходимо установить новый пароль</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="new_password">Новый пароль</label>
                <div class="password-container">
                    <input type="password" name="new_password" id="new_password"
                           placeholder="Введите новый пароль" required minlength="8">
                    <button
                        type="button"
                        class="password-toggle-btn"
                        data-password-toggle
                        data-target="new_password"
                        aria-label="Показать пароль"
                        aria-pressed="false"
                    >
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <div class="password-container">
                    <input type="password" name="confirm_password" id="confirm_password"
                           placeholder="Повторите новый пароль" required minlength="8" data-match-with="new_password">
                    <button
                        type="button"
                        class="password-toggle-btn"
                        data-password-toggle
                        data-target="confirm_password"
                        aria-label="Показать пароль"
                        aria-pressed="false"
                    >
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-save"></i> Сохранить пароль
            </button>
        </form>

        <div class="auth-footer">
            <p>Пароль должен содержать минимум 8 символов</p>
        </div>
    </div>
</div>

<script src="{% static 'js/password-toggle.js' %}?v=2026-04-27"></script>
<script src="{% static 'js/form-validation.js' %}?v=2026-04-27-forms"></script>

</body>
</html>
