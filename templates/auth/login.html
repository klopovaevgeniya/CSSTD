<!-- Summary: Файл `templates/auth/login.html`: содержит код и настройки для раздела "login". -->
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2026-04-27">
    <link rel="stylesheet" href="{% static 'css/responsive-global.css' %}?v=2026-04-27-all-pages">
    <link rel="stylesheet" href="{% static 'css/form-validation.css' %}?v=2026-04-27-forms">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">ЦСУРТ</div>
            <h1>Вход в систему</h1>
            <p>Система управления проектами АНО «ЦСУРТ»</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" name="username" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="password-container">
                    <input type="password" name="password" id="password" required>
                    <button
                        type="button"
                        class="password-toggle-btn"
                        data-password-toggle
                        data-target="password"
                        aria-label="Показать пароль"
                        aria-pressed="false"
                    >
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            {% if form.errors %}
                <div class="messages">
                    <div class="message error">
                        {% for field, errors in form.errors.items %}
                            {% for error in errors %}
                                {{ error }}
                            {% endfor %}
                        {% endfor %}
                    </div>
                </div>
            {% endif %}

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-sign-in-alt"></i> Войти
            </button>
        </form>

        <div class="auth-footer">
            <p>Доступ только для сотрудников организации</p>
        </div>
    </div>
</div>

<script src="{% static 'js/password-toggle.js' %}?v=2026-04-27"></script>
<script src="{% static 'js/form-validation.js' %}?v=2026-04-27-forms"></script>
</body>
</html>
