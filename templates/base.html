<!-- Summary: Файл `templates/base.html`: содержит код и настройки для раздела "base". -->
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ЦСУРТ{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">

<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/responsive-global.css' %}?v=2026-04-27-all-pages">
<link rel="stylesheet" href="{% static 'css/form-validation.css' %}?v=2026-04-27-forms">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">ЦСУРТ</div>

        <nav>
            <a href="{% url 'admin_dashboard' %}">
                <i class="fa-solid fa-chart-line"></i> Дашборд
            </a>
            <a href="{% url 'project_list' %}">
                <i class="fa-solid fa-folder-open"></i> Проекты
            </a>
            <a href="#">
                <i class="fa-solid fa-users"></i> Сотрудники
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <header class="topbar">
            <span>{{ request.user.username }}</span>
            <a href="{% url 'logout' %}">Выход</a>
        </header>

        <section class="page">
            {% block content %}{% endblock %}
        </section>
    </main>

</div>

<script src="{% static 'js/form-validation.js' %}?v=2026-04-27-forms"></script>
</body>
</html>
