{% extends 'manager/base_manager.html' %}
{% load static %}

{% block title %}График проектов{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1><i class="fa-solid fa-calendar-days"></i> График</h1>
    <p>Сроки сдачи проектов руководителя на выбранный месяц.</p>
</div>

<div class="calendar-wrapper">
    <div id="calendar"></div>
    <div id="calendarTooltip" class="calendar-tooltip" aria-hidden="true"></div>
</div>

<!-- Данные проектов для календаря -->
{{ projects_for_calendar|json_script:"projects-data" }}

<!-- Модальное окно с подробностями проекта -->
<div id="projectModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button type="button" class="modal-close" data-close="true" aria-label="Закрыть">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-header">
            <h2 id="modalTitle">Проект</h2>
            <div id="modalStatus" class="project-status"></div>
        </div>
        <div class="modal-body">
            <div id="modalList" class="modal-list"></div>
            <div id="modalDetail" class="modal-detail" style="display:none;">
                <p id="modalDates" class="modal-meta"></p>
                <p id="modalDescription" class="modal-description"></p>
            </div>
        </div>
        <div class="modal-footer">
            <a id="modalProjectLink" href="#" class="btn btn-sm">Открыть проект</a>
        </div>
    </div>
</div>

<style>
    .dashboard-header {
        margin-bottom: 32px;
        animation: slideDownFade 0.5s ease-out;
    }

    .dashboard-header h1 {
        margin: 0 0 8px 0;
        font-size: 2.5em;
        font-weight: 700;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
    }

    .dashboard-header p {
        margin: 0;
        color: #666;
        font-size: 1.1em;
        font-weight: 500;
    }

    .calendar-wrapper {
        max-width: 1140px;
        width: min(100%, 1140px);
        margin: 0 auto 60px;
        padding: 0 16px;
        animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .calendar-tooltip {
        position: fixed;
        pointer-events: none;
        z-index: 2100;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 12px 40px rgba(231, 111, 81, 0.15);
        backdrop-filter: blur(8px);
        max-width: 280px;
        font-size: 0.9em;
        color: #264653;
        display: none;
        animation: scaleUp 0.3s ease-out;
    }

    .calendar-tooltip h4 {
        margin: 0 0 8px 0;
        font-size: 1.05em;
        font-weight: 700;
        color: var(--primary);
    }

    .calendar-tooltip p {
        margin: 4px 0;
        line-height: 1.5;
    }

    /* FullCalendar overrides */
    .fc {
        background: var(--card-bg);
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        padding: 0;
        overflow: hidden;
        border: 1px solid rgba(0,0,0,0.02);
    }

    .fc-toolbar {
        padding: 16px 20px;
        background: linear-gradient(135deg, rgba(231, 111, 81, 0.03), rgba(244, 162, 97, 0.03));
        border-bottom: 1px solid rgba(0,0,0,0.04);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
    }

    .fc-toolbar-chunk {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    /* Шапка дней недели */
    .fc-col-header {
        background: linear-gradient(135deg, rgba(231, 111, 81, 0.05), rgba(244, 162, 97, 0.05));
        border-bottom: 2px solid rgba(231, 111, 81, 0.15);
    }

    .fc-col-header-cell {
        border: none;
        padding: 12px 4px;
    }

    .fc-col-header-cell-cushion {
        font-weight: 700;
        color: var(--secondary);
        font-size: 0.95em;
    }

    .fc .fc-toolbar-title {
        font-size: 1.5em;
        font-weight: 700;
        color: var(--secondary);
        margin: 0;
    }

    .fc .fc-toolbar-chunk:not(:last-child) {
        margin-right: 12px;
    }

    .fc-button {
        border-radius: 8px;
        border: 1px solid rgba(231, 111, 81, 0.3);
        background: white;
        color: var(--primary);
        box-shadow: 0 2px 8px rgba(231, 111, 81, 0.1);
        transition: all 0.2s ease;
        padding: 6px 14px;
        font-weight: 600;
    }

    .fc-button:hover {
        background: rgba(231, 111, 81, 0.08);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(231, 111, 81, 0.2);
    }

    .fc-button:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(231, 111, 81, 0.3);
    }

    .fc-button.fc-button-active {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 15px rgba(231, 111, 81, 0.3);
    }

    .fc-event {
        border: none;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 0.85em;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .fc-event:hover {
        transform: scale(1.02) translateY(-2px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .fc-event-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 600;
    }

    .fc-daygrid-day {
        padding: 4px !important;
    }

    .fc-daygrid-day-number {
        padding: 8px 8px !important;
    }

    .fc-daygrid-day.fc-day-other {
        background: rgba(0, 0, 0, 0.02);
    }

    .fc-daygrid-day:hover {
        background: rgba(231, 111, 81, 0.02);
    }

    .modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal[aria-hidden="false"] {
        display: flex;
    }

    .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
        backdrop-filter: blur(4px);
    }

    .modal-dialog {
        position: relative;
        width: min(640px, 100%);
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        overflow: hidden;
        z-index: 1;
        padding: 32px;
        animation: modalFadeIn 0.3s ease-out;
    }

    @keyframes modalFadeIn {
        from {
            opacity: 0;
            transform: scale(0.92) translateY(-30px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        border: none;
        background: rgba(0, 0, 0, 0.05);
        color: #666;
        font-size: 1.1em;
        cursor: pointer;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .modal-close:hover {
        background: rgba(231, 111, 81, 0.15);
        color: var(--primary);
    }

    .modal-header {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .modal-header h2 {
        margin: 0;
        font-size: 1.5em;
        font-weight: 700;
        color: var(--secondary);
        flex: 1;
    }

    .project-status {
        font-size: 0.85em;
        padding: 6px 14px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(231, 111, 81, 0.1), rgba(244, 162, 97, 0.1));
        color: var(--primary);
        font-weight: 600;
        white-space: nowrap;
    }

    .modal-body {
        padding: 20px 0;
    }

    .modal-meta {
        margin: 8px 0;
        color: #555;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .modal-meta::before {
        content: '📅';
        font-size: 1.1em;
    }

    .modal-description {
        margin-top: 12px;
        line-height: 1.6;
        color: #444;
        padding: 14px;
        background: rgba(231, 111, 81, 0.03);
        border-radius: 10px;
        border-left: 3px solid var(--primary);
    }

    .modal-list {
        display: grid;
        gap: 12px;
        margin-bottom: 20px;
    }

    .modal-list-item {
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(231, 111, 81, 0.05);
        border: 1px solid rgba(231, 111, 81, 0.2);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .modal-list-item:hover {
        background: rgba(231, 111, 81, 0.12);
        border-color: rgba(231, 111, 81, 0.4);
        transform: translateX(4px);
    }

    .modal-list-item h3 {
        margin: 0 0 6px 0;
        font-size: 1.05em;
        font-weight: 700;
        color: var(--secondary);
    }

    .modal-list-item p {
        margin: 0;
        color: #555;
        font-size: 0.9em;
    }

    .modal-footer {
        margin-top: 20px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding-top: 16px;
        border-top: 1px solid rgba(0,0,0,0.06);
    }

    .btn {
        padding: 11px 20px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(231, 111, 81, 0.3);
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(231, 111, 81, 0.4);
    }

    .btn:active {
        transform: translateY(0);
    }

    .btn-secondary {
        background: rgba(38,70,83,0.08);
        color: var(--secondary);
        box-shadow: none;
    }

    .btn-secondary:hover {
        background: rgba(38,70,83,0.14);
    }

    .btn-sm {
        padding: 8px 16px;
        font-size: 0.9em;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rawData = document.getElementById('projects-data');
        const events = JSON.parse(rawData.textContent || '[]');

        const calendarEl = document.getElementById('calendar');

        const getColor = (id) => {
            // Простая детерминированная генерация цвета по id
            const palette = [
                'rgba(231,111,81,0.45)',
                'rgba(42,157,143,0.45)',
                'rgba(38,70,83,0.35)',
                'rgba(244,162,97,0.4)',
                'rgba(142,202,230,0.45)',
                'rgba(214,40,40,0.35)',
                'rgba(0,119,182,0.35)',
                'rgba(0,109,119,0.35)',
                'rgba(155,34,38,0.35)',
                'rgba(106,153,78,0.35)'
            ];
            const numericId = parseInt(String(id).replace(/\D/g, ''), 10);
            const index = Number.isNaN(numericId) ? 0 : numericId;
            return palette[index % palette.length];
        };

        const allEvents = events.map(item => ({
            id: item.id,
            title: item.title,
            start: item.start,
            end: item.end,
            backgroundColor: getColor(item.id),
            borderColor: 'rgba(0,0,0,0.1)',
            textColor: '#ffffff',
            extendedProps: {
                status: item.status,
                type: item.type,
                description: item.description,
                code: item.code,
                start_date: item.start_date,
            }
        }));

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ru',
            buttonText: {
                today: 'Сегодня'
            },
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            dayMaxEvents: true,
            events: allEvents,
            eventDidMount: function (info) {
                info.el.removeAttribute('title');

                const showTooltip = (content, rect) => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.innerHTML = content;
                    tooltip.style.display = 'block';
                    tooltip.style.top = `${Math.max(rect.top - 12, 12)}px`;
                    tooltip.style.left = `${Math.min(rect.right + 8, window.innerWidth - tooltip.offsetWidth - 12)}px`;
                };

                const hideTooltip = () => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.style.display = 'none';
                };

                info.el.addEventListener('mouseenter', () => {
                    const props = info.event.extendedProps;
                    const status = props.status ? `<strong>Статус:</strong> ${props.status}` : '';
                    const deadline = info.event.end ? `<strong>Срок:</strong> ${FullCalendar.formatDate(info.event.end, {year: 'numeric', month: '2-digit', day: '2-digit'})}` : '';
                    const description = props.description ? `<div style="margin-top:6px;">${props.description}</div>` : '';

                    const content = `
                        <h4>${info.event.title}</h4>
                        <p>${status}</p>
                        <p>${deadline}</p>
                        ${description}
                    `;

                    showTooltip(content, info.el.getBoundingClientRect());
                });

                info.el.addEventListener('mouseleave', hideTooltip);
            },
            dayCellDidMount: function (arg) {
                const dateStr = arg.date.toISOString().slice(0, 10);
                const items = allEvents.filter(item => item.start === dateStr);
                if (!items.length) return;

                const showTooltip = (content, rect) => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.innerHTML = content;
                    tooltip.style.display = 'block';
                    tooltip.style.top = `${Math.max(rect.top - 12, 12)}px`;
                    tooltip.style.left = `${Math.min(rect.right + 8, window.innerWidth - tooltip.offsetWidth - 12)}px`;
                };

                const hideTooltip = () => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.style.display = 'none';
                };

                arg.el.addEventListener('mouseenter', () => {
                    const projectNames = items.slice(0, 3).map(i => `<li>${i.title}</li>`).join('');
                    const extra = items.length > 3 ? `<li>...и ещё ${items.length - 3}</li>` : '';
                    const content = `
                        <h4>${items.length} проект${items.length === 1 ? '' : 'ов'}</h4>
                        <ul style="margin:6px 0 0 0; padding-left: 18px;">${projectNames}${extra}</ul>
                    `;

                    showTooltip(content, arg.el.getBoundingClientRect());
                });

                arg.el.addEventListener('mouseleave', hideTooltip);
            },
            eventClick: function (info) {
                const props = info.event.extendedProps;

                renderDetail({
                    id: info.event.id,
                    title: info.event.title,
                    status: props.status,
                    type: props.type,
                    start_date: props.start_date,
                    end: info.event.end ? FullCalendar.formatDate(info.event.end, {year: 'numeric', month: '2-digit', day: '2-digit'}) : '',
                    description: props.description,
                    code: props.code,
                });

                openModal();
            },
            dateClick: function (arg) {
                const clickedDate = arg.dateStr;
                const items = allEvents.filter(item => item.start === clickedDate);
                renderList(clickedDate, items);
            }
        });

        calendar.render();

        function openModal() {
            document.getElementById('projectModal').setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            document.getElementById('projectModal').setAttribute('aria-hidden', 'true');
        }

        function renderDetail(item) {
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalStatus').textContent = item.status || '';

const start = item.start_date ? item.start_date : '';
            const end = item.end ? item.end : '';
            document.getElementById('modalDates').textContent = start && end ? `Период: ${start} — ${end}` : (end ? `Дата завершения: ${end}` : '');

            document.getElementById('modalDescription').textContent = item.description || 'Описание отсутствует.';
            document.getElementById('modalProjectLink').href = `/manager/projects/${item.id}/detail/`;

            document.getElementById('modalList').style.display = 'none';
            document.getElementById('modalDetail').style.display = 'block';
        }

        function renderList(dateStr, items) {
            if (items.length === 1) {
                renderDetail(items[0]);
                openModal();
                return;
            }

            const listEl = document.getElementById('modalList');
            listEl.innerHTML = '';

            const title = document.createElement('h3');
            title.textContent = `Проекты на ${dateStr}`;
            title.style.margin = '0 0 10px 0';
            listEl.appendChild(title);

            if (!items.length) {
                const message = document.createElement('p');
                message.textContent = 'Нет проектов на выбранную дату.';
                listEl.appendChild(message);
            } else {
                items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'modal-list-item';

                    const heading = document.createElement('h3');
                    heading.textContent = item.title;
                    itemEl.appendChild(heading);

                    const meta = document.createElement('p');
                    meta.textContent = `${item.status ? item.status + ' · ' : ''}${item.type ? item.type : ''}`;
                    itemEl.appendChild(meta);

                    itemEl.addEventListener('click', () => {
                        renderDetail(item);
                    });

                    listEl.appendChild(itemEl);
                });
            }

            document.getElementById('modalDetail').style.display = 'none';
            listEl.style.display = 'block';

            openModal();
        }


        document.querySelectorAll('[data-close="true"]').forEach(el => {
            el.addEventListener('click', closeModal);
        });

        // Закрытие по Esc
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    });
</script>
{% endblock %}
