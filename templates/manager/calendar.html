{% extends 'manager/base_manager.html' %}
{% load static %}
<!-- Summary: Файл `templates/manager/calendar.html`: содержит код и настройки для раздела "calendar". -->

{% block title %}График задач и проектов{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1><i class="fa-solid fa-calendar-days"></i> График</h1>
    <p>Сроки сдачи проектов и задач руководителя на выбранный месяц.</p>
</div>

<div class="calendar-wrapper">
    <div id="calendar"></div>
    <div id="calendarTooltip" class="calendar-tooltip" aria-hidden="true"></div>
</div>

<!-- Данные проектов/задач для календаря -->
{{ calendar_items|json_script:"calendar-data" }}

<!-- Модальное окно с подробностями проекта -->
<div id="projectModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button type="button" class="modal-close" data-close="true" aria-label="Закрыть">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-header">
            <h2 id="modalTitle">Проект</h2>
            <div id="modalStatus" class="project-status"></div>
        </div>
        <div class="modal-body">
            <div id="modalList" class="modal-list"></div>
            <div id="modalDetail" class="modal-detail" style="display:none;">
                <p id="modalDates" class="modal-meta"></p>
                <p id="modalDescription" class="modal-description"></p>
            </div>
        </div>
        <div class="modal-footer">
            <a id="modalProjectLink" href="#" class="btn btn-sm">Открыть</a>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideDownFade {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes scaleUp {
        from {
            opacity: 0;
            transform: scale(0.9);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    @keyframes modalFadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    }

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rawData = document.getElementById('calendar-data');
        const items = JSON.parse(rawData.textContent || '[]');

        const calendarEl = document.getElementById('calendar');

        const getColor = (id) => {
            // Простая детерминированная генерация цвета по id
            const palette = [
                'rgba(231, 111, 81, 0.75)',
                'rgba(244, 162, 97, 0.75)',
                'rgba(233, 196, 106, 0.75)',
                'rgba(42, 157, 143, 0.7)',
                'rgba(38, 70, 83, 0.68)',
                'rgba(231, 111, 81, 0.66)',
                'rgba(244, 162, 97, 0.66)',
                'rgba(233, 196, 106, 0.66)',
                'rgba(42, 157, 143, 0.64)',
                'rgba(38, 70, 83, 0.64)'
            ];
            // Поддерживаем строки вида "project-1" / "task-2" и числовые id
            const numericId = parseInt(String(id).replace(/\D/g, ''), 10);
            const index = Number.isNaN(numericId) ? 0 : numericId;
            return palette[index % palette.length];
        };

        const allEvents = items.map(item => ({
            id: item.id,
            title: item.title,
            start: item.start,
            end: item.end,
            backgroundColor: getColor(item.id),
            borderColor: 'rgba(0,0,0,0.1)',
            textColor: '#ffffff',
            extendedProps: {
                status: item.status,
                type: item.type,
                description: item.description,
                code: item.code,
                start_date: item.start_date,
                item_type: item.item_type,
                link: item.link,
            }
        }));

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            fixedWeekCount: false,
            showNonCurrentDates: true,
            height: 'auto',
            contentHeight: 'auto',
            expandRows: true,
            locale: 'ru',
            buttonText: {
                today: 'Сегодня'
            },
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            dayMaxEvents: true,
            events: allEvents,
            eventDidMount: function (info) {
                info.el.removeAttribute('title');

                const showTooltip = (content, anchorRect) => {
                    const tooltip = document.getElementById('calendarTooltip');
                    const wrapperRect = calendarEl.getBoundingClientRect();

                    tooltip.innerHTML = content;
                    tooltip.style.display = 'block';

                    const gap = 8;
                    const anchorLeft = anchorRect.left - wrapperRect.left;
                    const anchorTop = anchorRect.top - wrapperRect.top;
                    const anchorWidth = anchorRect.width;
                    const anchorHeight = anchorRect.height;

                    const rightPos = anchorLeft + anchorWidth + gap;
                    const leftPos = anchorLeft - tooltip.offsetWidth - gap;

                    let left = rightPos;
                    if (rightPos + tooltip.offsetWidth > wrapperRect.width - 8) {
                        left = leftPos;
                    }
                    if (left < 8) {
                        left = 8;
                    }
                    if (left + tooltip.offsetWidth > wrapperRect.width - 8) {
                        left = Math.max(8, wrapperRect.width - tooltip.offsetWidth - 8);
                    }

                    let top = anchorTop;
                    if (top + tooltip.offsetHeight > wrapperRect.height - 8) {
                        top = anchorTop + anchorHeight - tooltip.offsetHeight;
                    }
                    if (top < 8) {
                        top = 8;
                    }
                    if (top + tooltip.offsetHeight > wrapperRect.height - 8) {
                        top = Math.max(8, wrapperRect.height - tooltip.offsetHeight - 8);
                    }

                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                };

                const hideTooltip = () => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.style.display = 'none';
                };

                info.el.addEventListener('mouseenter', () => {
                    const props = info.event.extendedProps;
                    const type = props.item_type ? `<strong>Тип:</strong> ${props.item_type}` : '';
                    const projectLine = props.code ? `<strong>Проект:</strong> ${props.code}` : '';
                    const status = props.status ? `<strong>Статус:</strong> ${props.status}` : '';
                    const deadline = info.event.end ? `<strong>Срок:</strong> ${FullCalendar.formatDate(info.event.end, {year: 'numeric', month: '2-digit', day: '2-digit'})}` : '';
                    const description = props.description ? `<div style="margin-top:6px;">${props.description}</div>` : '';

                    const content = `
                        <h4>${info.event.title}</h4>
                        <p>${type}</p>
                        <p>${projectLine}</p>
                        <p>${status}</p>
                        <p>${deadline}</p>
                        ${description}
                    `;

                    const dayCell = info.el.closest('.fc-daygrid-day');
                    const anchorRect = (dayCell || info.el).getBoundingClientRect();
                    showTooltip(content, anchorRect);
                });

                info.el.addEventListener('mouseleave', hideTooltip);
            },
            dayCellDidMount: function (arg) {
                const dateStr = arg.date.toISOString().slice(0, 10);
                const itemsOnDate = allEvents.filter(item => item.start === dateStr);
                if (!itemsOnDate.length) return;

                const showTooltip = (content, anchorRect) => {
                    const tooltip = document.getElementById('calendarTooltip');
                    const wrapperRect = calendarEl.getBoundingClientRect();

                    tooltip.innerHTML = content;
                    tooltip.style.display = 'block';

                    const gap = 8;
                    const anchorLeft = anchorRect.left - wrapperRect.left;
                    const anchorTop = anchorRect.top - wrapperRect.top;
                    const anchorWidth = anchorRect.width;
                    const anchorHeight = anchorRect.height;

                    const rightPos = anchorLeft + anchorWidth + gap;
                    const leftPos = anchorLeft - tooltip.offsetWidth - gap;

                    let left = rightPos;
                    if (rightPos + tooltip.offsetWidth > wrapperRect.width - 8) {
                        left = leftPos;
                    }
                    if (left < 8) {
                        left = 8;
                    }
                    if (left + tooltip.offsetWidth > wrapperRect.width - 8) {
                        left = Math.max(8, wrapperRect.width - tooltip.offsetWidth - 8);
                    }

                    let top = anchorTop;
                    if (top + tooltip.offsetHeight > wrapperRect.height - 8) {
                        top = anchorTop + anchorHeight - tooltip.offsetHeight;
                    }
                    if (top < 8) {
                        top = 8;
                    }
                    if (top + tooltip.offsetHeight > wrapperRect.height - 8) {
                        top = Math.max(8, wrapperRect.height - tooltip.offsetHeight - 8);
                    }

                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                };

                const hideTooltip = () => {
                    const tooltip = document.getElementById('calendarTooltip');
                    tooltip.style.display = 'none';
                };

                arg.el.addEventListener('mouseenter', () => {
                    const projectNames = itemsOnDate.slice(0, 3).map(i => `<li>${i.title}</li>`).join('');
                    const extra = itemsOnDate.length > 3 ? `<li>...и ещё ${itemsOnDate.length - 3}</li>` : '';
                    const content = `
                        <h4>${itemsOnDate.length} элемент${itemsOnDate.length === 1 ? '' : 'ов'}</h4>
                        <ul style="margin:6px 0 0 0; padding-left: 18px;">${projectNames}${extra}</ul>
                    `;

                    showTooltip(content, arg.el.getBoundingClientRect());
                });

                arg.el.addEventListener('mouseleave', hideTooltip);
            },
            eventClick: function (info) {
                const props = info.event.extendedProps;

                renderDetail({
                    id: info.event.id,
                    title: info.event.title,
                    status: props.status,
                    type: props.type,
                    start_date: props.start_date,
                    end: info.event.end ? FullCalendar.formatDate(info.event.end, {year: 'numeric', month: '2-digit', day: '2-digit'}) : '',
                    description: props.description,
                    code: props.code,
                    item_type: props.item_type,
                    link: props.link,
                });

                openModal();
            },
            dateClick: function (arg) {
                const clickedDate = arg.dateStr;
                const itemsOnDate = allEvents.filter(item => item.start === clickedDate);
                renderList(clickedDate, itemsOnDate);
            }
        });

        calendar.render();
        setTimeout(() => calendar.updateSize(), 0);
        window.addEventListener('resize', () => calendar.updateSize());

        function openModal() {
            document.getElementById('projectModal').setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            document.getElementById('projectModal').setAttribute('aria-hidden', 'true');
        }

        function renderDetail(item) {
            const titlePrefix = item.item_type === 'task' ? 'Задача: ' : 'Проект: ';
            document.getElementById('modalTitle').textContent = `${titlePrefix}${item.title}`;
            document.getElementById('modalStatus').textContent = item.status || '';

            const start = item.start_date ? item.start_date : '';
            const end = item.end ? item.end : '';
            document.getElementById('modalDates').textContent = start && end ? `Период: ${start} — ${end}` : (end ? `Дата завершения: ${end}` : '');

            document.getElementById('modalDescription').textContent = item.description || 'Описание отсутствует.';
            document.getElementById('modalProjectLink').href = item.link || '#';
            document.getElementById('modalProjectLink').textContent = item.link ? 'Открыть' : 'Нет ссылки';

            document.getElementById('modalList').style.display = 'none';
            document.getElementById('modalDetail').style.display = 'block';
        }

        function renderList(dateStr, items) {
            if (items.length === 1) {
                renderDetail(items[0]);
                openModal();
                return;
            }

            const listEl = document.getElementById('modalList');
            listEl.innerHTML = '';

            const title = document.createElement('h3');
            title.textContent = `Элементы на ${dateStr}`;
            title.style.margin = '0 0 10px 0';
            listEl.appendChild(title);

            if (!items.length) {
                const message = document.createElement('p');
                message.textContent = 'Нет проектов или задач на выбранную дату.';
                listEl.appendChild(message);
            } else {
                items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'modal-list-item';

                    const heading = document.createElement('h3');
                    heading.textContent = item.title;
                    itemEl.appendChild(heading);

                    const meta = document.createElement('p');
                    meta.textContent = `${item.type ? item.type + ' · ' : ''}${item.status ? item.status : ''}`;
                    itemEl.appendChild(meta);

                    itemEl.addEventListener('click', () => {
                        renderDetail(item);
                    });

                    listEl.appendChild(itemEl);
                });
            }

            document.getElementById('modalDetail').style.display = 'none';
            listEl.style.display = 'block';

            openModal();
        }

        document.querySelectorAll('[data-close="true"]').forEach(el => {
            el.addEventListener('click', closeModal);
        });

        // Закрытие по Esc
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    });
</script>
{% endblock %}
